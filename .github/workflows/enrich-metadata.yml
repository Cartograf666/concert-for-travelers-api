name: "Enrich Artists (Tier-2 Metadata: genres/popularity/image)"

# Genres + popularity (Last.fm artist.getInfo, one call gives both -- needs a free
# LASTFM_API_KEY) and an artist image (Deezer artist search, keyless). Separate
# pending-gate (metaEnrichedAt/metaTriedAt) from the identity enrichment tiers
# (enrich-auto.yml/enrich-database.yml), so this sweeps the whole catalog on its
# own schedule regardless of whether an artist already has a website/socials.

on:
  schedule:
    - cron: '15 */4 * * *' # every 4 hours, offset from enrich-auto's :30/*3 and the 03:00 daily scrape
  workflow_dispatch:
    inputs:
      chunk_size:
        description: 'Artists to process this run'
        required: true
        default: '3000'

permissions:
  contents: write
  issues: write # open/update a dedup'd failure issue (see "Alert on failure" step)

# Serialize with every other data/artists/ (sharded artist DB) writer (enrich-auto,
# enrich-database/wd-bulk, self-heal auto-merges).
concurrency:
  group: artist-db-write
  cancel-in-progress: false

jobs:
  enrich-metadata:
    runs-on: ubuntu-latest
    # Must stay under the 4h/240min cron cadence above (concurrency below is
    # cancel-in-progress: false, so a run still going at its own next scheduled
    # trigger just queues behind itself instead of being replaced). Previously
    # 330 (5.5h) -- past its own cadence -- tightened to match enrich-auto.yml's
    # identical fix.
    timeout-minutes: 200
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # True job-elapsed-time reference for the soft-deadline check below --
      # capturing it here (not inside the loop step) means the budget accounts
      # for every preceding step's real duration too, not just this step's own.
      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> "$GITHUB_ENV"

      # Same checkpointed sub-chunk-and-commit shape as enrich-auto.yml: a run that
      # gets cancelled or times out (this can legitimately take a while at Last.fm's
      # polite pacing) loses at most one sub-chunk's worth of work instead of
      # everything back to the start. enrich_metadata.ts is already resumable
      # (re-reads the DB fresh each invocation, marks each artist as it goes).
      - name: Run Tier-2 metadata enrichment (checkpointed)
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          CHUNK_SIZE_INPUT: ${{ github.event.inputs.chunk_size }}
        run: |
          set -eo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          SUB_CHUNK=150
          REMAINING=${CHUNK_SIZE_INPUT:-3000}
          # timeout-minutes above is 200 -- stop 15min short so a truncated run exits
          # 0 (success, picked up next run) instead of getting force-killed by GitHub
          # Actions mid-sub-chunk and reported as a failure (which trips the alert-on-
          # failure issue for what is actually just normal, expected backlog behavior).
          SOFT_DEADLINE_SECS=$((185 * 60))

          while [ "$REMAINING" -gt 0 ]; do
            if [ $(( $(date +%s) - JOB_START )) -ge "$SOFT_DEADLINE_SECS" ]; then
              echo "Approaching this job's timeout-minutes budget -- stopping the loop early so the run finishes cleanly (success) instead of being force-killed mid-sub-chunk. Remaining artists pick up on the next scheduled run."
              break
            fi

            THIS_RUN=$SUB_CHUNK
            if [ "$REMAINING" -lt "$SUB_CHUNK" ]; then THIS_RUN=$REMAINING; fi

            npm run enrich-metadata -- "$THIS_RUN" 2>&1 | tee /tmp/enrich-metadata.log

            if grep -q "Nothing pending for the metadata tier" /tmp/enrich-metadata.log; then
              echo "Nothing left to process -- stopping the loop early."
              break
            fi

            if git diff --quiet -- data/artists/; then
              echo "Sub-chunk made no changes to commit."
            else
              git add data/artists/
              git commit -m "auto: Tier-2 metadata enrichment (genres/popularity/image) [skip ci]"

              # main gets concurrent writes (daily-scrape, self-heal auto-merges,
              # other enrich runs) -- retry with rebase instead of failing outright.
              # Sharding means two writers only actually conflict if they touched
              # the SAME shard file; different shards rebase cleanly.
              pushed=false
              for i in 1 2 3 4 5; do
                if git push; then
                  pushed=true
                  break
                fi
                echo "Push rejected (concurrent write), retrying with rebase ($i/5)..."
                git fetch origin main
                if ! git rebase origin/main; then
                  echo "::warning::Rebase conflict on data/artists/ -- dropping this sub-chunk's commit."
                  git rebase --abort
                  # Resync to origin BEFORE the conflict-drop commit below -- otherwise that
                  # commit lands on the same stale base the push was just rejected against
                  # and is itself guaranteed to fail as a non-fast-forward. Resyncing first
                  # also means the next sub-chunk starts from current state instead of
                  # recomputing/dropping the identical work over and over until timeout.
                  git fetch origin main
                  git reset --hard origin/main
                  npm run record-conflict-drop -- enrich-metadata || true
                  git add data/conflict-drops.json && git commit -m "chore: record conflict-drop metric [skip ci]" && git push || true
                  break
                fi
                sleep $((RANDOM % 5 + 2))
              done

              if [ "$pushed" = "true" ]; then
                echo "Committed and pushed this sub-chunk's Tier-2 metadata enrichment."
              else
                echo "::warning::Could not push this sub-chunk after retries -- its work stays local and will be redone next run."
              fi
            fi

            REMAINING=$((REMAINING - THIS_RUN))
          done

      # Turn a silent scheduled-run failure into a visible, deduplicated GitHub issue.
      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/alert-on-failure
        with:
          workflow-name: "Enrich Artists (Tier-2 Metadata)"
          job-label: enrich-metadata
