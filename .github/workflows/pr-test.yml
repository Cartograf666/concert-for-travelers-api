name: PR Verification

on:
  pull_request:
    branches:
      - main
    paths:
      - 'scrapers/**'
      - 'data/**'
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'tsconfig.json'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # a wedged run must not sit on the 6h Actions default ceiling
    # self-heal.yml already runs this exact test suite itself (npm ci + playwright
    # install + npm test) to gate whether a repaired scraper config is good, then
    # squash-merges the PR immediately without waiting on this workflow -- so this
    # run has zero gating value on that branch and just pays for a second full
    # chromium install + test run on every auto-merge. Skip it there.
    if: ${{ !startsWith(github.head_ref, 'auto/self-heal-') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # tests/runner.test.ts unconditionally exercises the playwright_render code
      # path -- without chromium installed, "Run Tests" below hangs/fails on it.
      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build project
        run: npm run build

      - name: Lint code
        run: npm run lint
        continue-on-error: true

      - name: Run Tests
        run: npm run test
