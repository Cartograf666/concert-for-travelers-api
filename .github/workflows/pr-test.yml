name: PR Verification

on:
  pull_request:
    branches:
      - main
    paths:
      - 'scrapers/**'
      - 'data/**'
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'tsconfig.json'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # tests/runner.test.ts unconditionally exercises the playwright_render code
      # path -- without chromium installed, "Run Tests" below hangs/fails on it.
      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build project
        run: npm run build

      - name: Run Tests
        run: npm run test
