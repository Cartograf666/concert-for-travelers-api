name: Artist Tour-Page Scrape

on:
  schedule:
    - cron: '0 4 * * *' # Daily, 04:00 UTC -- 2205 targets / 800-per-run cap cycles the full list every ~3 days
  workflow_dispatch:

permissions:
  contents: read
  issues: write # open/update a dedup'd failure issue (see "Alert on failure" step)

concurrency:
  group: 'artist-scrape'
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90 # can cover hundreds/thousands of artist configs; a wedged run must still not run forever
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for playwright_render scrapers
        id: check-playwright
        run: |
          if grep -rl '"type"[[:space:]]*:[[:space:]]*"playwright_render"' scrapers/artists/*.json > /dev/null 2>&1; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browser (chromium)
        if: steps.check-playwright.outputs.needed == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build project
        run: npm run build

      # Persisted across runs so an artist whose tour page didn't change can be
      # skipped (conditional request / hash match), same pattern as the daily
      # venue scrape cache.
      - name: Restore artist scrape cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: reports/artist-scrape-cache.json
          key: artist-scrape-cache-${{ github.run_id }}
          restore-keys: |
            artist-scrape-cache-

      # Per-artist last-successful Bandsintown results. Persisted so the batched
      # sweep resumes where it left off (stalest-first) instead of re-fetching the
      # same head of the list every run, and so a blocked/failed run falls back to
      # last-good data instead of dropping an artist's shows.
      - name: Restore Bandsintown cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: reports/bandsintown-cache.json
          key: bandsintown-cache-${{ github.run_id }}
          restore-keys: |
            bandsintown-cache-

      # Per-artist last-successful Eventbrite discovery-search results. Same
      # batched/resumable pattern as the Bandsintown cache above. See
      # src/engine/eventbrite.ts for why this scrapes public pages (no public
      # multi-organizer search API exists) and the accepted ToS-risk tradeoff.
      - name: Restore Eventbrite cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: reports/eventbrite-cache.json
          key: eventbrite-cache-${{ github.run_id }}
          restore-keys: |
            eventbrite-cache-

      - name: Run artist tour-page + Bandsintown + Eventbrite scraper
        env:
          # Optional: a real partner app_id if/when granted. Falls back to the public
          # widget app_id in code when unset. See src/engine/bandsintown.ts.
          BANDSINTOWN_APP_ID: ${{ secrets.BANDSINTOWN_APP_ID }}
          # Batch size per run -- keeps each run gentle on the public feed; the
          # cache makes successive runs advance through the full list.
          BANDSINTOWN_MAX_PER_RUN: '800'
          # Smaller/gentler cap than Bandsintown -- see src/engine/eventbrite.ts.
          EVENTBRITE_MAX_PER_RUN: '300'
          # This step's tour-page pass runs the exact same runner.ts as
          # daily-scrape.yml, including the budget-capped LLM-extraction fallback
          # (src/engine/llm_extraction_fallback.ts) -- without a key configured it
          # silently no-ops, which is exactly what was happening here before this
          # was wired: the ~59 auto-generated artist-<slug> tour scrapers this
          # workflow runs never got any fallback coverage at all.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_RESERV1: ${{ secrets.GEMINI_API_KEY_RESERV1 }}
          GEMINI_API_KEY_RESERV2: ${{ secrets.GEMINI_API_KEY_RESERV2 }}
          GEMINI_API_KEY_RESERV3: ${{ secrets.GEMINI_API_KEY_RESERV3 }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        run: npm run scrape-artists

      - name: Save artist scrape cache
        if: always()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: reports/artist-scrape-cache.json
          key: artist-scrape-cache-${{ github.run_id }}

      - name: Save Bandsintown cache
        if: always()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: reports/bandsintown-cache.json
          key: bandsintown-cache-${{ github.run_id }}

      - name: Save Eventbrite cache
        if: always()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: reports/eventbrite-cache.json
          key: eventbrite-cache-${{ github.run_id }}

      - name: Upload reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artist-scrape-reports
          path: |
            reports/artist-scrape-cache.json
            reports/bandsintown-cache.json
            reports/eventbrite-cache.json
          retention-days: 5

      # Turn a silent scheduled-run failure into a visible, deduplicated GitHub issue
      # (GitHub only emails the workflow author, and mutes that after repeated failures).
      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/alert-on-failure
        with:
          workflow-name: Artist Tour-Page Scrape
          job-label: scrape
