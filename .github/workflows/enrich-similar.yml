name: "Enrich Artists (Tier-2 Similar Artists)"

# "You might also like" recommendations: one Last.fm artist.getsimilar call per
# artist, cross-referenced against our own whitelist so every suggestion is
# something the consumer app can actually link to. Separate pending-gate
# (similarEnrichedAt/similarTriedAt) from every other tier, so this sweeps the
# whole catalog on its own schedule regardless of what else has run.

on:
  schedule:
    - cron: '45 */6 * * *' # every 6 hours, offset from enrich-auto/-metadata/the daily scrape
  workflow_dispatch:
    inputs:
      chunk_size:
        description: 'Artists to process this run'
        required: true
        default: '3000'

permissions:
  contents: write
  issues: write # open/update a dedup'd failure issue (see "Alert on failure" step)

# Serialize with every other data/artists/ (sharded artist DB) writer (enrich-auto,
# enrich-database/wd-bulk, enrich-metadata, self-heal auto-merges).
concurrency:
  group: artist-db-write
  cancel-in-progress: false

jobs:
  enrich-similar:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # True job-elapsed-time reference for the soft-deadline check below --
      # capturing it here (not inside the loop step) means the budget accounts
      # for every preceding step's real duration too, not just this step's own.
      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> "$GITHUB_ENV"

      # Same checkpointed sub-chunk-and-commit shape as enrich-metadata.yml: a run
      # that gets cancelled or times out loses at most one sub-chunk's worth of
      # work instead of everything back to the start. enrich_similar_artists.ts is
      # already resumable (re-reads the DB fresh each invocation, marks each
      # artist as it goes).
      - name: Run Tier-2 similar-artists enrichment (checkpointed)
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          CHUNK_SIZE_INPUT: ${{ github.event.inputs.chunk_size }}
        run: |
          set -eo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          SUB_CHUNK=150
          REMAINING=${CHUNK_SIZE_INPUT:-3000}
          # timeout-minutes above is 330 -- stop 15min short so a truncated run exits
          # 0 (success, picked up next run) instead of getting force-killed by GitHub
          # Actions mid-sub-chunk and reported as a failure (which trips the alert-on-
          # failure issue for what is actually just normal, expected backlog behavior).
          SOFT_DEADLINE_SECS=$((315 * 60))

          while [ "$REMAINING" -gt 0 ]; do
            if [ $(( $(date +%s) - JOB_START )) -ge "$SOFT_DEADLINE_SECS" ]; then
              echo "Approaching this job's timeout-minutes budget -- stopping the loop early so the run finishes cleanly (success) instead of being force-killed mid-sub-chunk. Remaining artists pick up on the next scheduled run."
              break
            fi

            THIS_RUN=$SUB_CHUNK
            if [ "$REMAINING" -lt "$SUB_CHUNK" ]; then THIS_RUN=$REMAINING; fi
            rm -rf /tmp/artists-before /tmp/artists-after
            cp -R data/artists /tmp/artists-before

            npm run enrich-similar -- "$THIS_RUN" 2>&1 | tee /tmp/enrich-similar.log
            cp -R data/artists /tmp/artists-after

            if grep -q "Nothing pending for the similar-artists tier\|LASTFM_API_KEY not set" /tmp/enrich-similar.log; then
              echo "Nothing left to process -- stopping the loop early."
              break
            fi

            if git diff --quiet -- data/artists/; then
              echo "Sub-chunk made no changes to commit."
            else
              git add data/artists/
              git commit -m "auto: Tier-2 similar-artists enrichment [skip ci]"

              # main gets concurrent writes (daily-scrape, self-heal auto-merges,
              # other enrich runs) -- retry with rebase instead of failing outright.
              # Sharding means two writers only actually conflict if they touched
              # the SAME shard file; different shards rebase cleanly.
              pushed=false
              for i in 1 2 3 4 5; do
                if git push; then
                  pushed=true
                  break
                fi
                echo "Push rejected (concurrent write), retrying with rebase ($i/5)..."
                git fetch origin main
                if ! git rebase origin/main; then
                  echo "::warning::Rebase conflict on data/artists/ -- replaying this sub-chunk on fresh origin/main."
                  git rebase --abort
                  git fetch origin main
                  git reset --hard origin/main
                  npm run reapply-artist-db-delta -- /tmp/artists-before /tmp/artists-after
                  if git diff --quiet -- data/artists/; then
                    echo "::warning::Replay produced no data/artists changes; nothing to push."
                  else
                    git add data/artists/
                    git commit -m "auto: Tier-2 similar-artists enrichment (reapplied) [skip ci]"
                    if git push; then pushed=true; else npm run record-conflict-drop -- enrich-similar || true; fi
                  fi
                  break
                fi
                sleep $((RANDOM % 5 + 2))
              done

              if [ "$pushed" = "true" ]; then
                echo "Committed and pushed this sub-chunk's similar-artists enrichment."
              else
                echo "::warning::Could not push this sub-chunk after retries -- its work stays local and will be redone next run."
              fi
            fi

            REMAINING=$((REMAINING - THIS_RUN))
          done

      # Turn a silent scheduled-run failure into a visible, deduplicated GitHub issue.
      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/alert-on-failure
        with:
          workflow-name: "Enrich Artists (Tier-2 Similar Artists)"
          job-label: enrich-similar
