name: Daily Concert Scrape

on:
  schedule:
    - cron: '0 3 * * *' # Daily at 03:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write # open/update a dedup'd failure issue (see "Alert on failure" step)

jobs:
  # Own concurrency group (shared with enrich-auto.yml/enrich-database.yml) because
  # this job's own "Commit and Push Enriched Artist Metadata" step below writes the
  # same data/approved_artists.json those workflows do. Previously this whole
  # workflow only had the 'pages' group, so a same-file write here could run fully
  # in parallel with an enrich-* run -- both racing to push, repeatedly hitting an
  # unresolvable rebase conflict and dropping real enrichment work (observed live:
  # 3 consecutive enrich-auto sub-chunks lost to this race in one run). Splitting
  # deploy into its own job below is what lets this one join artist-db-write without
  # losing the pages-specific cancel-in-progress behavior.
  scrape:
    concurrency:
      group: artist-db-write
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30 # a wedged run must not sit on the 6h Actions default ceiling
    outputs:
      should_deploy: ${{ steps.health-check.outputs.should_deploy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Only pay Chromium's download/install cost on days a 'playwright_render'
      # scraper actually exists -- most venues are plain HTTP fetches.
      - name: Check for playwright_render scrapers
        id: check-playwright
        run: |
          if grep -l '"type"[[:space:]]*:[[:space:]]*"playwright_render"' scrapers/*.json > /dev/null 2>&1; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browser (chromium)
        if: steps.check-playwright.outputs.needed == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build project
        run: npm run build

      # Persist the per-venue change-detection cache across daily runs. Without it
      # the fresh checkout starts empty, every venue always looks "changed", and the
      # scraper's short-circuit never fires in CI.
      - name: Restore scrape cache
        uses: actions/cache/restore@v4
        with:
          path: reports/scrape-cache.json
          key: scrape-cache-${{ github.run_id }}
          restore-keys: |
            scrape-cache-

      # Which concerts were already known as of the last run, so dist/changes.json
      # only reports genuinely new ones. Not git-tracked -- same cache mechanism as
      # the scrape cache above, so it doesn't add another writer to the repo.
      - name: Restore changelog cache
        uses: actions/cache/restore@v4
        with:
          path: reports/changelog-cache.json
          key: changelog-cache-${{ github.run_id }}
          restore-keys: |
            changelog-cache-

      # Per-country last-successful Ticketmaster results, so a transient failure on
      # one country falls back to yesterday's data instead of contributing nothing.
      - name: Restore Ticketmaster cache
        uses: actions/cache/restore@v4
        with:
          path: reports/ticketmaster-cache.json
          key: ticketmaster-cache-${{ github.run_id }}
          restore-keys: |
            ticketmaster-cache-

      # Baseline of the last successfully-deployed publish stats, so the health
      # gate below has something to compare a fresh totalConcerts against.
      - name: Restore last-good publish stats
        uses: actions/cache/restore@v4
        with:
          path: reports/last-good-stats.json
          key: publish-stats-${{ github.run_id }}
          restore-keys: |
            publish-stats-

      # Read-only: owned and saved by artist-scrape.yml (its own, less-frequent
      # workflow -- see there for why). This job only merges in whatever it last
      # produced, never scrapes scrapers/artists/ itself, so it never saves this key.
      - name: Restore artist scrape cache
        uses: actions/cache/restore@v4
        with:
          path: reports/artist-scrape-cache.json
          key: artist-scrape-cache-${{ github.run_id }}
          restore-keys: |
            artist-scrape-cache-

      # Read-only, same as the artist tour-page cache above: owned by
      # artist-scrape.yml's Bandsintown sweep, merged into today's publish here.
      - name: Restore Bandsintown cache
        uses: actions/cache/restore@v4
        with:
          path: reports/bandsintown-cache.json
          key: bandsintown-cache-${{ github.run_id }}
          restore-keys: |
            bandsintown-cache-

      # Sync the whitelist from the user's target list first: a name added to
      # data/artist_scrape_targets.txt must be in approved_artists.json or its
      # scraped/Bandsintown shows get dropped as "not approved". Idempotent (adds
      # only what's missing); the diff is committed by the enrich step below, so
      # editing the target list is all that's needed to cover a new artist.
      - name: Sync target artists into whitelist
        run: npm run add-targets

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_RESERV1: ${{ secrets.GEMINI_API_KEY_RESERV1 }}
          GEMINI_API_KEY_RESERV2: ${{ secrets.GEMINI_API_KEY_RESERV2 }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: npm run scrape

      - name: Save scrape cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: reports/scrape-cache.json
          key: scrape-cache-${{ github.run_id }}

      - name: Save changelog cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: reports/changelog-cache.json
          key: changelog-cache-${{ github.run_id }}

      - name: Save Ticketmaster cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: reports/ticketmaster-cache.json
          key: ticketmaster-cache-${{ github.run_id }}

      # Gate the deploy: publishConcerts has no built-in floor on how few concerts
      # it's willing to publish, so a scraper regression or mass venue failure could
      # otherwise ship a near-empty/empty dataset straight to production. A no-op day
      # (nothing changed, run.ts's short-circuit means dist/ was never written) is
      # NOT a failure -- it just means there's nothing new to deploy.
      - name: Check publish health
        id: health-check
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('dist/index.json')) {
              console.log('No dist/index.json -- scrape run was a no-op (nothing changed since last deploy). Skipping deploy.');
              core.setOutput('should_deploy', 'false');
              return;
            }

            const index = JSON.parse(fs.readFileSync('dist/index.json', 'utf-8'));
            const total = index.stats.totalConcerts;
            console.log(`Freshly published totalConcerts: ${total}`);

            if (total === 0) {
              core.setFailed('Health gate: totalConcerts is 0 -- refusing to deploy an empty dataset.');
              return;
            }

            let baseline = null;
            if (fs.existsSync('reports/last-good-stats.json')) {
              baseline = JSON.parse(fs.readFileSync('reports/last-good-stats.json', 'utf-8'));
            }
            if (baseline && total < baseline.totalConcerts * 0.5) {
              core.setFailed(
                `Health gate: totalConcerts dropped from ${baseline.totalConcerts} to ${total} ` +
                `(more than 50%) -- refusing to deploy. Investigate before overriding.`
              );
              return;
            }

            fs.mkdirSync('reports', { recursive: true });
            fs.writeFileSync('reports/last-good-stats.json', JSON.stringify(index.stats, null, 2));
            core.setOutput('should_deploy', 'true');

      - name: Save last-good publish stats
        if: steps.health-check.outputs.should_deploy == 'true'
        uses: actions/cache/save@v4
        with:
          path: reports/last-good-stats.json
          key: publish-stats-${{ github.run_id }}

      - name: Commit and Push Enriched Artist Metadata
        run: |
          if git diff --quiet data/approved_artists.json; then
            echo "No new artist metadata enriched."
          else
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add data/approved_artists.json
            git commit -m "auto: enrich artist websites and socials [skip ci]"

            # main is written to concurrently (self-heal auto-merges, the enrich-*
            # workflows, manual pushes) -- a bare push races and fails on any
            # concurrent write. Retry with rebase a few times before giving up;
            # this file is supplementary enrichment data, so on an unresolvable
            # conflict, drop this run's commit rather than fail the whole job --
            # the next scheduled enrichment pass will redo the work.
            pushed=false
            for i in 1 2 3 4 5; do
              if git push; then
                pushed=true
                break
              fi
              echo "Push rejected (concurrent write), retrying with rebase ($i/5)..."
              git fetch origin main
              if ! git rebase origin/main; then
                echo "::warning::Rebase conflict on data/approved_artists.json -- dropping this run's enrichment commit."
                git rebase --abort
                break
              fi
              sleep $((RANDOM % 5 + 2))
            done

            if [ "$pushed" = "true" ]; then
              echo "Successfully committed and pushed enriched artist metadata."
            else
              echo "::warning::Could not push enriched artist metadata after retries -- skipped for this run."
            fi
          fi

      - name: Upload fail log report
        uses: actions/upload-artifact@v4
        with:
          name: scraper-reports
          path: reports/
          retention-days: 5

      - name: Setup Pages
        if: steps.health-check.outputs.should_deploy == 'true'
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: steps.health-check.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # Turn a silent scheduled-run failure into a visible, deduplicated GitHub issue
      # (GitHub only emails the workflow author, and mutes that after repeated failures).
      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/alert-on-failure
        with:
          job-label: scrape

  # Separate job (not just a step) so its 'pages' concurrency lock -- which cancels
  # a stale in-progress deploy the moment a newer one starts -- only ever applies to
  # the actual Pages deployment, never to the scrape/enrich job above (which needs
  # to queue, not cancel, against enrich-auto/enrich-database instead; see the
  # comment on the `scrape` job). `actions/deploy-pages` picks up the artifact
  # `actions/upload-pages-artifact` uploaded in the `scrape` job automatically --
  # no explicit download step needed since both jobs belong to the same workflow run.
  deploy:
    needs: scrape
    if: needs.scrape.outputs.should_deploy == 'true'
    concurrency:
      group: pages
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Narrower than the workflow-level permissions block: this job never pushes
    # to the repo (that's the scrape job's git push), so no contents: write here.
    permissions:
      pages: write
      id-token: write
      issues: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Needed to resolve the local ./.github/actions/alert-on-failure composite
      # action below -- deploy-pages itself doesn't need a checkout.
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/alert-on-failure
        with:
          job-label: deploy
