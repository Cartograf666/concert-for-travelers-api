name: Daily Concert Scrape

on:
  schedule:
    - cron: '0 3 * * *' # Daily at 03:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  scrape:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # Persist the per-venue change-detection cache across daily runs. Without it
      # the fresh checkout starts empty, every venue always looks "changed", and the
      # scraper's short-circuit never fires in CI.
      - name: Restore scrape cache
        uses: actions/cache/restore@v4
        with:
          path: reports/scrape-cache.json
          key: scrape-cache-${{ github.run_id }}
          restore-keys: |
            scrape-cache-

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run scrape

      - name: Save scrape cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: reports/scrape-cache.json
          key: scrape-cache-${{ github.run_id }}

      - name: Commit and Push Enriched Artist Metadata
        run: |
          if git diff --quiet data/approved_artists.json; then
            echo "No new artist metadata enriched."
          else
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add data/approved_artists.json
            git commit -m "auto: enrich artist websites and socials [skip ci]"
            git push
            echo "Successfully committed and pushed enriched artist metadata."
          fi

      - name: Upload fail log report
        uses: actions/upload-artifact@v4
        with:
          name: scraper-reports
          path: reports/
          retention-days: 5

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
