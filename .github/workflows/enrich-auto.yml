name: Enrich Artists (Tier-0 MusicBrainz)

# Free, LLM-free enrichment tail: sweeps the artists that the Wikidata bulk pass
# missed, in resumable chunks, on a schedule. Each run marks what it processed
# (enrichedAt on a hit, autoTriedAt on a clean miss), so successive runs advance
# through the catalog and become cheap no-ops once nothing is left.

on:
  schedule:
    - cron: '30 */3 * * *' # every 3 hours, offset from the 03:00 daily scrape
  workflow_dispatch:
    inputs:
      chunk_size:
        description: 'Artists to process this run'
        required: true
        default: '3000'

permissions:
  contents: write
  issues: write # open/update a dedup'd failure issue (see "Alert on failure" step)

# Serialize with the Gemini enrichment workflow so two writers never race on
# data/artists/ (the sharded artist DB).
concurrency:
  group: artist-db-write
  cancel-in-progress: false

jobs:
  enrich-auto:
    runs-on: ubuntu-latest
    # Must stay comfortably under the 3h cron interval above: cancel-in-progress
    # is false on this workflow's concurrency group, so a run still going at the
    # 3h mark doesn't get cancelled -- it just makes its own next scheduled
    # trigger QUEUE and wait behind it, and the one after that, potentially
    # compounding into a growing backlog. Previously 330 (5.5h), well past its
    # own cadence -- tightened so a slow run truncates itself cleanly instead.
    timeout-minutes: 165
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # True job-elapsed-time reference for the soft-deadline check below --
      # capturing it here (not inside the loop step) means the budget accounts
      # for every preceding step's real duration too, not just this step's own.
      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> "$GITHUB_ENV"

      # Run in small sub-chunks with a commit+push after each, instead of one
      # 3000-artist call committed only at the very end. enrich_auto.ts is already
      # resumable (marks each artist as it goes and re-reads the DB fresh on every
      # invocation), so calling it repeatedly with a small N is a pure workflow-level
      # change -- no script changes needed. A run that gets cancelled or times out
      # (this job legitimately takes hours at MusicBrainz's ~1 req/s pace) now loses
      # at most one sub-chunk's worth of work instead of everything back to the
      # start, the same fix already applied to the Gemini JIT enrichment path.
      - name: Run MusicBrainz Tier-0 enrichment (checkpointed)
        env:
          CHUNK_SIZE_INPUT: ${{ github.event.inputs.chunk_size }}
        run: |
          set -eo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          SUB_CHUNK=150
          REMAINING=${CHUNK_SIZE_INPUT:-3000}
          # timeout-minutes above is 165 -- stop 15min short so a truncated run exits
          # 0 (success, picked up next run) instead of getting force-killed by GitHub
          # Actions mid-sub-chunk and reported as a failure (which trips the alert-on-
          # failure issue for what is actually just normal, expected backlog behavior).
          SOFT_DEADLINE_SECS=$((150 * 60))

          while [ "$REMAINING" -gt 0 ]; do
            if [ $(( $(date +%s) - JOB_START )) -ge "$SOFT_DEADLINE_SECS" ]; then
              echo "Approaching this job's timeout-minutes budget -- stopping the loop early so the run finishes cleanly (success) instead of being force-killed mid-sub-chunk. Remaining artists pick up on the next scheduled run."
              break
            fi

            THIS_RUN=$SUB_CHUNK
            if [ "$REMAINING" -lt "$SUB_CHUNK" ]; then THIS_RUN=$REMAINING; fi
            rm -rf /tmp/artists-before /tmp/artists-after
            cp -R data/artists /tmp/artists-before

            npm run enrich-auto -- "$THIS_RUN" 2>&1 | tee /tmp/enrich-auto.log
            cp -R data/artists /tmp/artists-after

            if grep -q "Nothing pending for the auto tier" /tmp/enrich-auto.log; then
              echo "Nothing left to process -- stopping the loop early."
              break
            fi

            if git diff --quiet -- data/artists/; then
              echo "Sub-chunk made no changes to commit."
            else
              git add data/artists/
              git commit -m "auto: MusicBrainz Tier-0 enrichment [skip ci]"

              # main gets concurrent writes (daily-scrape, self-heal auto-merges,
              # other enrich runs) -- retry with rebase instead of failing outright.
              # Sharding means two writers only actually conflict if they touched
              # the SAME shard file; different shards rebase cleanly.
              pushed=false
              for i in 1 2 3 4 5; do
                if git push; then
                  pushed=true
                  break
                fi
                echo "Push rejected (concurrent write), retrying with rebase ($i/5)..."
                git fetch origin main
                if ! git rebase origin/main; then
                  echo "::warning::Rebase conflict on data/artists/ -- replaying this sub-chunk on fresh origin/main."
                  git rebase --abort
                  git fetch origin main
                  git reset --hard origin/main
                  npm run reapply-artist-db-delta -- /tmp/artists-before /tmp/artists-after
                  if git diff --quiet -- data/artists/; then
                    echo "::warning::Replay produced no data/artists changes; nothing to push."
                  else
                    git add data/artists/
                    git commit -m "auto: MusicBrainz Tier-0 enrichment (reapplied) [skip ci]"
                    if git push; then pushed=true; else npm run record-conflict-drop -- enrich-auto || true; fi
                  fi
                  break
                fi
                sleep $((RANDOM % 5 + 2))
              done

              if [ "$pushed" = "true" ]; then
                echo "Committed and pushed this sub-chunk's Tier-0 enrichment."
              else
                echo "::warning::Could not push this sub-chunk after retries -- its work stays local and will be redone next run."
              fi
            fi

            REMAINING=$((REMAINING - THIS_RUN))
          done

      # Turn a silent scheduled-run failure into a visible, deduplicated GitHub issue.
      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/alert-on-failure
        with:
          workflow-name: "Enrich Artists (Tier-0 MusicBrainz)"
          job-label: enrich-auto
