name: Data Hygiene

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: artist-db-write
  cancel-in-progress: false

jobs:
  hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Audit artist gaps
        run: |
          npm run audit-gaps | tee /tmp/audit-output.log
          {
            echo "## Artist Gaps Audit Report"
            echo ''
            echo '```'
            cat /tmp/audit-output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run data-hygiene scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_RESERV1: ${{ secrets.GEMINI_API_KEY_RESERV1 }}
          GEMINI_API_KEY_RESERV2: ${{ secrets.GEMINI_API_KEY_RESERV2 }}
          GEMINI_API_KEY_RESERV3: ${{ secrets.GEMINI_API_KEY_RESERV3 }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        run: |
          set -eo pipefail
          rm -rf /tmp/artists-before /tmp/artists-after
          cp -R data/artists /tmp/artists-before

          # 1. Prune Non-Artists (select -> classify -> apply)
          echo "Selecting prune candidates..."
          npm run prune-non-artists -- candidates 100 /tmp/prune-candidates.json

          if [ "$(jq '. | length' /tmp/prune-candidates.json)" -eq 0 ]; then
            echo "No prune candidates selected."
          else
            echo "Classifying prune candidates..."
            npm run prune-non-artists -- classify /tmp/prune-candidates.json /tmp/prune-results.json 15 4000
            echo "Applying prune classifications..."
            npm run prune-non-artists -- apply /tmp/prune-results.json
          fi

          # 2. Clean Denylist
          echo "Cleaning denylisted entries..."
          npm run clean-denylist
          cp -R data/artists /tmp/artists-after

      - name: Commit and push changes
        run: |
          set -eo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if git diff --quiet -- data/artists/; then
            echo "No database changes to commit."
          else
            git add data/artists/
            git commit -m "auto: data-hygiene database prune [skip ci]"

            pushed=false
            for i in 1 2 3 4 5; do
              if git push; then
                pushed=true
                break
              fi
              echo "Push rejected (concurrent write), retrying with rebase ($i/5)..."
              git fetch origin main
              if ! git rebase origin/main; then
                echo "::warning::Rebase conflict on data/artists/ -- replaying hygiene changes on fresh origin/main."
                git rebase --abort
                git fetch origin main
                git reset --hard origin/main
                npm run reapply-artist-db-delta -- /tmp/artists-before /tmp/artists-after
                if git diff --quiet -- data/artists/; then
                  echo "::warning::Replay produced no data/artists changes; nothing to push."
                else
                  git add data/artists/
                  git commit -m "auto: data-hygiene database prune (reapplied) [skip ci]"
                  if git push; then pushed=true; else npm run record-conflict-drop -- data-hygiene || true; fi
                fi
                break
              fi
              sleep $((RANDOM % 5 + 2))
            done

            if [ "$pushed" = "true" ]; then
              echo "Committed and pushed data-hygiene changes."
            else
              echo "::warning::Could not push data-hygiene changes after retries."
            fi
          fi

      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/alert-on-failure
        with:
          workflow-name: "Data Hygiene"
          job-label: hygiene
