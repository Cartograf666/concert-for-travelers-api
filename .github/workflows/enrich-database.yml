name: Enrich Artist Database

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      chunk_size:
        description: 'Number of artists to enrich in this run'
        required: true
        default: '100'
      batch_size:
        description: 'Artists per single Gemini request (higher = fewer requests, more risk of JSON/name mixups)'
        required: false
        default: '15'
      delay_ms:
        description: 'Delay between Gemini requests in ms (keep clear of free-tier RPM limit)'
        required: false
        default: '4000'

permissions:
  contents: write

# Serialize with the MusicBrainz Tier-0 workflow so two writers never race on
# data/artists/ (the sharded artist DB).
concurrency:
  group: artist-db-write
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    # Shares the artist-db-write concurrency lock (cancel-in-progress: false) with
    # enrich-auto.yml, which caps itself at 165min specifically so a long run here
    # doesn't block that workflow's 3h cron trigger for hours. This job had no cap
    # at all (falling back to GitHub's 360min default) -- bounded to match.
    timeout-minutes: 165
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # True job-elapsed-time reference for the soft-deadline check in the checkpointed
      # Gemini loop below -- capturing it here (before the uncapped Wikidata-bulk/mbid-
      # backfill steps) means the loop's budget accounts for their real duration too,
      # not just its own step's.
      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> "$GITHUB_ENV"

      # Tier-0: free structured enrichment (Wikidata SPARQL bulk, no LLM) sweeps the
      # whole catalog first so Gemini only spends calls on the remaining long tail.
      # Idempotent — already-tried artists are marked and skipped.
      - name: Run Wikidata bulk enrichment (Tier-0, no LLM)
        run: npm run enrich-wd-bulk -- 100000

      # One-off (but idempotent/safe to re-run) backfill: retrofits `mbid` for
      # artists that were already enriched by MusicBrainz/Wikidata before that
      # field existed. Manual-dispatch-only like this whole workflow, not on a
      # cron -- unlike the tiers above it has no "already tried, don't re-check"
      # marker, so it re-queries every artist still missing an mbid each run.
      - name: Backfill mbid for already-enriched artists
        run: npm run backfill-mbid -- 100000

      - name: Debug Model IDs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx src/scripts/list_models.ts

      # Run in small sub-chunks with a commit+push after each, instead of one
      # single Gemini call over the whole chunk_size committed only at the very
      # end -- a run that gets cancelled/times out (this can legitimately take
      # hours at 15 artists/request + a multi-second delay per request) now loses
      # at most one sub-chunk's worth of Gemini calls instead of the entire run's,
      # same checkpointing already used by enrich-auto/-metadata/-similar.yml.
      - name: Run Gemini enrichment (checkpointed)
        env:
          # Multi-key failover (src/engine/gemini_keys.ts): each secret set here is an
          # independent free-tier project/quota bucket. Unset ones are just skipped --
          # add GEMINI_API_KEY_2/_3/.../_RESERV1/... as repo secrets to add more.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_RESERV1: ${{ secrets.GEMINI_API_KEY_RESERV1 }}
          GEMINI_API_KEY_RESERV2: ${{ secrets.GEMINI_API_KEY_RESERV2 }}
          GEMINI_API_KEY_RESERV3: ${{ secrets.GEMINI_API_KEY_RESERV3 }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          CHUNK_SIZE_INPUT: ${{ github.event.inputs.chunk_size }}
          BATCH_SIZE_INPUT: ${{ github.event.inputs.batch_size }}
          DELAY_MS_INPUT: ${{ github.event.inputs.delay_ms }}
        run: |
          set -eo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          SUB_CHUNK=300
          REMAINING=${CHUNK_SIZE_INPUT:-100}
          BATCH_SIZE=${BATCH_SIZE_INPUT:-15}
          DELAY_MS=${DELAY_MS_INPUT:-4000}
          # timeout-minutes above is 165 -- stop 15min short so a truncated run exits
          # 0 (success, picked up next run) instead of getting force-killed by GitHub
          # Actions mid-sub-chunk and reported as a failure (which trips the alert-on-
          # failure issue for what is actually just normal, expected backlog behavior).
          SOFT_DEADLINE_SECS=$((150 * 60))

          while [ "$REMAINING" -gt 0 ]; do
            if [ $(( $(date +%s) - JOB_START )) -ge "$SOFT_DEADLINE_SECS" ]; then
              echo "Approaching this job's timeout-minutes budget -- stopping the loop early so the run finishes cleanly (success) instead of being force-killed mid-sub-chunk. Remaining artists pick up on the next scheduled run."
              break
            fi

            THIS_RUN=$SUB_CHUNK
            if [ "$REMAINING" -lt "$SUB_CHUNK" ]; then THIS_RUN=$REMAINING; fi
            rm -rf /tmp/artists-before /tmp/artists-after
            cp -R data/artists /tmp/artists-before

            npx tsx src/scripts/enrich_via_gemini_search.ts "$THIS_RUN" /tmp/results.json "$BATCH_SIZE" "$DELAY_MS" 2>&1 | tee /tmp/enrich-gemini.log

            if grep -q "No pending artists found" /tmp/enrich-gemini.log; then
              echo "Nothing left to process -- stopping the loop early."
              break
            fi

            if grep -q "All keys/models exhausted" /tmp/enrich-gemini.log; then
              echo "::warning::All Gemini keys/models are quota-exhausted -- stopping early instead of burning the rest of this run on guaranteed-fail sub-chunks. Re-run once quotas reset."
              break
            fi

            npm run enrich-sites apply /tmp/results.json
            cp -R data/artists /tmp/artists-after

            if git diff --quiet -- data/artists/ scrapers/; then
              echo "Sub-chunk made no changes to commit."
            else
              git add data/artists/ scrapers/
              git commit -m "auto: enrich artist database chunk [skip ci]"

              # main gets concurrent writes (daily-scrape, self-heal auto-merges,
              # other enrich runs) -- retry with rebase instead of failing outright.
              # Sharding means two writers only actually conflict if they touched
              # the SAME shard file; different shards rebase cleanly.
              pushed=false
              for i in 1 2 3 4 5; do
                if git push; then
                  pushed=true
                  break
                fi
                echo "Push rejected (concurrent write), retrying with rebase ($i/5)..."
                git fetch origin main
                if ! git rebase origin/main; then
                  echo "::warning::Rebase conflict -- replaying artist DB changes on fresh origin/main."
                  git rebase --abort
                  git fetch origin main
                  git reset --hard origin/main
                  npm run reapply-artist-db-delta -- /tmp/artists-before /tmp/artists-after
                  if git diff --quiet -- data/artists/; then
                    echo "::warning::Replay produced no data/artists changes; scraper config changes from this conflicted sub-chunk will be retried next run."
                  else
                    git add data/artists/
                    git commit -m "auto: enrich artist database chunk (reapplied) [skip ci]"
                    if git push; then pushed=true; else npm run record-conflict-drop -- enrich-database || true; fi
                  fi
                  break
                fi
                sleep $((RANDOM % 5 + 2))
              done

              if [ "$pushed" = "true" ]; then
                echo "Committed and pushed this sub-chunk's Gemini enrichment."
              else
                echo "::warning::Could not push this sub-chunk after retries -- its work stays local and will be redone next run."
              fi
            fi

            REMAINING=$((REMAINING - THIS_RUN))
          done
