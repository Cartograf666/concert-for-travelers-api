name: Concurrency Starvation Watchdog

on:
  schedule:
    - cron: '20 */6 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  issues: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run concurrency drops watchdog
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: npm run check-concurrency-drops

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/concurrency-drops.json)" ]; then
            echo "Changes detected in data/concurrency-drops.json, committing..."
            git add data/concurrency-drops.json
            git commit -m "chore: record concurrency-preemption drops [skip ci]"
            
            # main gets concurrent writes from every other workflow in this repo --
            # retry with rebase instead of failing outright, same convention as every
            # other data-writing workflow here. On an unresolvable rebase conflict,
            # `break` (not `reset --hard` + `continue`) and leave pushed=false --
            # resetting hard here would silently discard this run's own just-made
            # commit (the drop data this workflow exists to record) and the NEXT
            # loop iteration's push would then trivially succeed with nothing new to
            # push, reporting false success while the recorded drop is gone.
            pushed=false
            for i in 1 2 3 4 5; do
              if git push; then
                pushed=true
                break
              fi
              echo "Push rejected (concurrent write), retrying with rebase ($i/5)..."
              git fetch origin main
              if ! git rebase origin/main; then
                echo "::warning::Rebase conflict on data/concurrency-drops.json -- dropping this run's commit."
                git rebase --abort
                git fetch origin main
                git reset --hard origin/main
                break
              fi
              sleep $((RANDOM % 5 + 2))
            done
            if [ "$pushed" = "false" ]; then
              echo "::warning::Failed to push concurrency-drops.json after retries -- this run's drop data was not recorded."
            fi
          else
            echo "No changes in data/concurrency-drops.json"
          fi
