name: Self-Healing Pipeline

on:
  workflow_run:
    workflows: ["Daily Concert Scrape"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  heal:
    runs-on: ubuntu-latest
    # Run only if the triggering workflow succeeded or completed, and we have failures to check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download fail log from triggering run
        id: download-reports
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p reports
          # Use GitHub CLI to download the artifact from the triggering run. A real
          # API/auth failure must be distinguishable from "no artifact exists yet"
          # (e.g. the triggering run never got to the upload step) -- only the latter
          # is a legitimate "nothing to heal" case.
          if gh run download ${{ github.event.workflow_run.id }} --name scraper-reports --dir reports 2> download-error.log; then
            echo "downloaded=true" >> "$GITHUB_OUTPUT"
          else
            if grep -qi "no valid artifacts found" download-error.log; then
              echo "No reports artifact found on the triggering run -- nothing to heal."
              echo "downloaded=false" >> "$GITHUB_OUTPUT"
            else
              echo "::error::gh run download failed for a reason other than a missing artifact:"
              cat download-error.log
              exit 1
            fi
          fi

      - name: Check if there are failures
        id: check-failures
        run: |
          if [ -f reports/fail-log.json ] && [ "$(jq '. | length' reports/fail-log.json)" -gt 0 ]; then
            echo "has_failures=true" >> $GITHUB_OUTPUT
            echo "Found failed scrapers. Proceeding with self-healing."
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
            echo "No failed scrapers found. Nothing to heal."
          fi

      - name: Setup Node.js
        if: steps.check-failures.outputs.has_failures == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        if: steps.check-failures.outputs.has_failures == 'true'
        run: npm ci

      - name: Run Healer Script
        if: steps.check-failures.outputs.has_failures == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run heal

      - name: Verify Fixed Configs
        if: steps.check-failures.outputs.has_failures == 'true'
        run: npm run test

      - name: Check for repaired scrapers
        if: steps.check-failures.outputs.has_failures == 'true'
        id: check-repaired
        run: |
          if [ -f reports/repair-summary.json ]; then
            echo "repaired=true" >> "$GITHUB_OUTPUT"
          else
            echo "repaired=false" >> "$GITHUB_OUTPUT"
            echo "No scraper configs were successfully repaired."
          fi

      # LLM-generated selectors are only tested against a single cached HTML sample
      # (npm run test above just confirms >=1 event extracted, not that it's correct).
      # Open a PR (audit trail + diff visibility) and squash-merge it automatically
      # once it's created -- the same tests that gate this job already passed, so
      # holding the PR for manual review would be the only non-autonomous step in
      # the whole pipeline. If a repair turns out wrong, its narrow selector diff
      # is trivial to revert from the PR history.
      - name: Open PR with repaired scrapers
        id: cpr
        if: steps.check-failures.outputs.has_failures == 'true' && steps.check-repaired.outputs.repaired == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "auto: self-healed broken scrapers"
          branch: auto/self-heal-${{ github.event.workflow_run.id }}
          delete-branch: true
          title: "Self-heal: repair broken scraper selectors"
          body: |
            Automated selector repair from the failed [Daily Concert Scrape run](${{ github.event.workflow_run.html_url }}).

            Repaired scrapers: see `reports/repair-summary.json` in this branch.

            The new selectors extracted at least one event from the cached HTML
            sample (verified by `npm run test` in the triggering job) and this PR
            was auto-merged on that basis. That check cannot confirm the extracted
            data is fully *correct* -- revert this PR if a scraper misbehaves.
          add-paths: scrapers/

      - name: Auto-merge repaired-scraper PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --squash --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"
