name: Daily Concert Scrape Retry

on:
  workflow_run:
    workflows: ["Daily Concert Scrape"]
    types:
      - completed

permissions:
  actions: write

jobs:
  retry:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'cancelled' && github.event.workflow_run.event == 'workflow_dispatch' }}
    steps:
      - name: Auto-retry cancelled Daily Concert Scrape
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          RUN_ID="${{ github.event.workflow_run.id }}"
          echo "Triggering workflow run ID: $RUN_ID"
          
          # Fetch the inputs from the triggering workflow run using GitHub API
          IS_RETRY=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}" --jq '.inputs.is_retry // "false"')
          echo "is_retry value: $IS_RETRY"
          
          if [ "$IS_RETRY" = "true" ]; then
            echo "Skipping auto-retry: The triggering run was already an auto-retry."
          else
            echo "The triggering run was not a retry. Retrying daily-scrape.yml..."
            gh workflow run daily-scrape.yml -f is_retry=true
            echo "Auto-retry dispatched successfully."
          fi
