name: Rank Tour-Page Scraper Candidates

# On-demand decision-support report, not a recurring job: ranks artists already
# on our own target list (data/artist_scrape_targets.txt) that don't yet have a
# dedicated scrapers/artists/*.json config, by Last.fm popularity -- so which
# artist gets a hand-built tour-page scraper next is picked from an objective,
# always-fresh signal instead of a hand-curated list. Read-only: never writes
# to data/approved_artists.json or any other tracked file.

on:
  workflow_dispatch:
    inputs:
      top_n:
        description: 'How many top candidates to list'
        required: true
        default: '30'

permissions:
  contents: read

jobs:
  rank:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Rank candidates
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          TOP_N_INPUT: ${{ github.event.inputs.top_n }}
        run: |
          npm run rank-scraper-candidates -- "$TOP_N_INPUT" | tee /tmp/rank-output.log
          {
            echo "## Tour-page scraper candidates (top $TOP_N_INPUT by Last.fm listeners)"
            echo ''
            echo '```'
            cat /tmp/rank-output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
