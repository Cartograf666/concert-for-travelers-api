name: Discover Popular Artists

on:
  schedule:
    - cron: '0 2 * * 6' # Saturday 02:00 UTC -- lands new names before Sunday's artist-scrape
  workflow_dispatch:

permissions:
  contents: write
  issues: write # open/update a dedup'd failure issue (see "Alert on failure" step)

concurrency:
  group: 'discover-artists'
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Discover popular artists from charts
        env:
          # All optional -- each source activates only when its key is present. With
          # none set, the script runs Deezer-only (keyless, thinner/regional).
          # Last.fm: worldwide per-country top artists. Spotify: Top-50 + Viral-50
          # (rising) per market + popularity.
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: npm run discover-artists

      - name: Commit updated target list
        run: |
          if git diff --quiet data/artist_scrape_targets.txt; then
            echo "No new artists discovered."
          else
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add data/artist_scrape_targets.txt
            git commit -m "auto: discover popular artists from charts [skip ci]"
            # main is written concurrently; retry-with-rebase, and on an
            # unresolvable conflict drop this run's commit (next week redoes it)
            # rather than fail -- this is supplementary discovery data.
            pushed=false
            for i in 1 2 3 4 5; do
              if git push; then pushed=true; break; fi
              echo "Push rejected, retrying with rebase ($i/5)..."
              git fetch origin main
              if ! git rebase origin/main; then
                echo "::warning::Rebase conflict on target list -- dropping this run's commit."
                git rebase --abort
                break
              fi
              sleep $((RANDOM % 5 + 2))
            done
            [ "$pushed" = "true" ] && echo "Pushed new artists." || echo "::warning::Could not push after retries -- skipped."
          fi

      # Turn a silent scheduled-run failure into a visible, deduplicated GitHub issue.
      - name: Alert on failure
        if: failure()
        uses: ./.github/actions/alert-on-failure
        with:
          workflow-name: Discover Popular Artists
          job-label: discover
